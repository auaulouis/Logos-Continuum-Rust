name: Desktop Side-by-Side

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
  APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
  APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
  APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
  APPLE_ID: ${{ secrets.APPLE_ID }}
  APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

jobs:
  electron-build:
    name: Electron Build + Metrics
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        working-directory: logos-web
        run: yarn install --immutable

      - name: Build Electron artifact
        working-directory: logos-web
        run: yarn electron:build:arm64

      - name: Collect Electron metrics
        run: |
          python3 scripts/collect_desktop_metrics.py \
            --mode electron \
            --workspace-root "$GITHUB_WORKSPACE" \
            --artifact-dir "$GITHUB_WORKSPACE/logos-web/dist-desktop" \
            --output "$GITHUB_WORKSPACE/.ci-metrics/electron-metrics.json"

      - name: Upload Electron artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-dist-desktop
          path: |
            logos-web/dist-desktop/**
            .ci-metrics/electron-metrics.json
          if-no-files-found: warn

  tauri-build-macos:
    name: Tauri Build macOS + Metrics
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        working-directory: logos-web
        run: yarn install --immutable

      - name: Import Apple Certificate
        if: env.APPLE_CERTIFICATE != ''
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Build Tauri artifact
        working-directory: logos-web
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: yarn tauri:build

      - name: Notarize macOS App
        if: env.APPLE_ID != ''
        working-directory: logos-web/src-tauri/target/release/bundle/macos
        run: |
          xcrun notarytool submit "Logos.app" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait || echo "Notarization skipped or failed"

      - name: Collect Tauri metrics
        run: |
          python3 scripts/collect_desktop_metrics.py \
            --mode tauri \
            --workspace-root "$GITHUB_WORKSPACE" \
            --artifact-dir "$GITHUB_WORKSPACE/logos-web/src-tauri/target/release/bundle" \
            --output "$GITHUB_WORKSPACE/.ci-metrics/tauri-metrics.json"

      - name: Upload Tauri artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-release-bundle-macos
          path: |
            logos-web/src-tauri/target/release/bundle/**
            .ci-metrics/tauri-metrics.json
          if-no-files-found: warn

  tauri-build-windows:
    name: Tauri Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        working-directory: logos-web
        run: yarn install --immutable

      - name: Build Tauri artifact
        working-directory: logos-web
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: yarn tauri:build

      - name: Upload Tauri Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-release-bundle-windows
          path: logos-web/src-tauri/target/release/bundle/**
          if-no-files-found: warn

  tauri-build-linux:
    name: Tauri Build Linux
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend deps
        working-directory: logos-web
        run: yarn install --immutable

      - name: Build Tauri artifact
        working-directory: logos-web
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: yarn tauri:build

      - name: Upload Tauri Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-release-bundle-linux
          path: logos-web/src-tauri/target/release/bundle/**
          if-no-files-found: warn

  compare-metrics:
    name: Compare Metrics
    runs-on: ubuntu-latest
    needs: [electron-build, tauri-build-macos, tauri-build-windows, tauri-build-linux]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Electron metrics
        uses: actions/download-artifact@v4
        with:
          name: electron-dist-desktop
          path: artifacts/electron

      - name: Download Tauri macOS metrics
        uses: actions/download-artifact@v4
        with:
          name: tauri-release-bundle-macos
          path: artifacts/tauri-macos

      - name: Build comparison summary
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          electron_path = Path('artifacts/electron/.ci-metrics/electron-metrics.json')
          tauri_path = Path('artifacts/tauri-macos/.ci-metrics/tauri-metrics.json')
          electron = json.loads(electron_path.read_text()) if electron_path.exists() else {}
          tauri = json.loads(tauri_path.read_text()) if tauri_path.exists() else {}

          def fmt_bytes(b):
              if b is None: return 'N/A'
              mb = b / (1024 * 1024)
              return f'{mb:.1f} MB'

          def fmt_ms(ms):
              return f'{ms} ms' if ms is not None else 'N/A'

          def fmt_kb(kb):
              if kb is None: return 'N/A'
              mb = kb / 1024
              return f'{mb:.1f} MB'

          e_size = electron.get('artifact_total_size_bytes')
          t_size = tauri.get('artifact_total_size_bytes')
          size_diff = None
          if e_size and t_size:
              size_diff = ((t_size - e_size) / e_size) * 100

          e_startup = electron.get('backend_startup_ms')
          t_startup = tauri.get('backend_startup_ms')
          startup_diff = None
          if e_startup and t_startup:
              startup_diff = ((t_startup - e_startup) / e_startup) * 100

          e_rss = electron.get('backend_rss_kb')
          t_rss = tauri.get('backend_rss_kb')
          rss_diff = None
          if e_rss and t_rss:
              rss_diff = ((t_rss - e_rss) / e_rss) * 100

          lines = [
              '## Desktop Metrics Comparison',
              '',
              '| Metric | Electron | Tauri | Difference |',
              '|--------|----------|-------|------------|',
              f'| Artifact Size | {fmt_bytes(e_size)} | {fmt_bytes(t_size)} | {f"{size_diff:+.1f}%" if size_diff is not None else "N/A"} |',
              f'| Backend Startup | {fmt_ms(e_startup)} | {fmt_ms(t_startup)} | {f"{startup_diff:+.1f}%" if startup_diff is not None else "N/A"} |',
              f'| Backend RSS | {fmt_kb(e_rss)} | {fmt_kb(t_rss)} | {f"{rss_diff:+.1f}%" if rss_diff is not None else "N/A"} |',
              '',
              '### Build Matrix',
              '',
              '| Platform | Electron | Tauri |',
              '|----------|----------|-------|',
              '| macOS arm64 | ✅ | ✅ |',
              '| Windows x64 | ❌ | ✅ |',
              '| Linux x64 | ❌ | ✅ |',
              '',
              '### Migration Readiness',
              '',
          ]

          # Calculate readiness score
          checks = []
          if t_size and e_size and t_size <= e_size * 1.5:
              checks.append('✅ Artifact size within 50% of Electron')
          else:
              checks.append('⚠️ Artifact size larger than 150% of Electron')

          if t_startup and e_startup and t_startup <= e_startup * 1.2:
              checks.append('✅ Startup time within 20% of Electron')
          else:
              checks.append('⚠️ Startup time needs optimization')

          if t_rss and e_rss and t_rss <= e_rss * 1.1:
              checks.append('✅ Memory usage within 10% of Electron')
          else:
              checks.append('⚠️ Memory usage needs investigation')

          for c in checks:
              lines.append(f'- {c}')

          summary = '\n'.join(lines)
          Path('desktop-metrics-summary.md').write_text(summary)
          with open(Path(__import__('os').environ['GITHUB_STEP_SUMMARY']), 'a') as f:
              f.write(summary + '\n')
          PY

      - name: Upload comparison summary
        uses: actions/upload-artifact@v4
        with:
          name: desktop-metrics-summary
          path: desktop-metrics-summary.md
          if-no-files-found: warn
